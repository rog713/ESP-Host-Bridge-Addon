name: "ESP Host Bridge"
version: "2026.03.21.33"
slug: "esp_host_bridge"
description: "USB CDC bridge and host telemetry web UI for ESP display devices."
url: "https://github.com/rog713/ESP-Host-Bridge"
homeassistant: "2024.1.0"
startup: services
boot: auto
init: false
arch:
  - amd64
  - aarch64
  - armv7
  - armhf
ingress: true
ingress_port: 8654
panel_icon: "mdi:monitor-dashboard"
panel_title: "ESP Host Bridge"
hassio_api: true
hassio_role: manager
homeassistant_api: true
udev: true
uart: true
full_access: false
apparmor: true
devices:
  - "/dev/ttyAMA0"
webui: "http://[HOST]:[PORT:8654]"
watchdog: "http://[HOST]:[PORT:8654]/api/status"
options:
  baud: "115200"
  interval: 1.0
  timeout: 2.0
  power_control_enabled: false
  addons_polling_enabled: true
  addons_interval: 2.0
  integrations_polling_enabled: true
  integrations_interval: 5.0
  activity_polling_enabled: true
  activity_interval: 10.0
  activity_limit: 12
  activity_lookback_minutes: 180
  gpu_polling_enabled: true
schema:
  serial_port: "device(subsystem=tty)?"
  baud: "list(1200|2400|4800|9600|19200|38400|57600|115200|230400|460800|921600|1000000|2000000|4000000)"
  interval: "float(0.1,)"
  timeout: "float(0.1,)"
  iface: "str?"
  disk_device: "str?"
  disk_temp_device: "str?"
  cpu_temp_sensor: "str?"
  fan_sensor: "str?"
  power_control_enabled: "bool"
  addons_polling_enabled: "bool"
  addons_interval: "float(0,)"
  integrations_polling_enabled: "bool"
  integrations_interval: "float(0,)"
  activity_polling_enabled: "bool"
  activity_interval: "float(0,)"
  activity_limit: "int(1,25)"
  activity_lookback_minutes: "int(5,1440)"
  gpu_polling_enabled: "bool"
