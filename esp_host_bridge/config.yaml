name: "ESP Host Bridge"
version: "2026.03.21.10"
slug: "esp_host_bridge"
description: "USB CDC bridge and host telemetry web UI for ESP display devices."
url: "https://github.com/rog713/ESP-Host-Bridge"
startup: services
boot: auto
init: false
arch:
  - amd64
  - aarch64
  - armv7
  - armhf
ingress: true
ingress_port: 8654
panel_icon: "mdi:monitor-dashboard"
panel_title: "ESP Host Bridge"
# host_network: true
# host_uts: true
hassio_api: true
hassio_role: manager
homeassistant_api: true
udev: true
uart: true
full_access: false
apparmor: true
webui: "http://[HOST]:[PORT:8654]"
watchdog: "http://[HOST]:[PORT:8654]/api/status"
options:
  serial_port: ""
  baud: 115200
  interval: 1.0
  timeout: 2.0
  iface: ""
  disk_device: ""
  disk_temp_device: ""
  cpu_temp_sensor: ""
  fan_sensor: ""
  power_control_enabled: false
  addons_polling_enabled: true
  addons_interval: 2.0
  integrations_polling_enabled: true
  integrations_interval: 5.0
  activity_polling_enabled: true
  activity_interval: 10.0
  activity_limit: 12
  activity_lookback_minutes: 180
  gpu_polling_enabled: true
  ha_entity_cpu: "sensor.processor_use"
  ha_entity_mem: "sensor.memory_use_percent"
  ha_entity_temp: "sensor.processor_temperature"
  ha_entity_disk_pct: ""
  ha_entity_net_rx: ""
  ha_entity_net_tx: ""
  ha_entity_fan: ""
  ha_entity_disk_temp: ""
  ha_entity_uptime: "sensor.last_boot"
  ha_entity_disk_read: ""
  ha_entity_disk_write: ""
schema:
  serial_port: "str?"
  baud: "int(1200,4000000)"
  interval: "float(0.1,)"
  timeout: "float(0.1,)"
  iface: "str?"
  disk_device: "str?"
  disk_temp_device: "str?"
  cpu_temp_sensor: "str?"
  fan_sensor: "str?"
  power_control_enabled: "bool"
  addons_polling_enabled: "bool"
  addons_interval: "float(0,)"
  integrations_polling_enabled: "bool"
  integrations_interval: "float(0,)"
  activity_polling_enabled: "bool"
  activity_interval: "float(0,)"
  activity_limit: "int(1,25)"
  activity_lookback_minutes: "int(5,1440)"
  gpu_polling_enabled: "bool"
  ha_entity_cpu: "str?"
  ha_entity_mem: "str?"
  ha_entity_temp: "str?"
  ha_entity_disk_pct: "str?"
  ha_entity_net_rx: "str?"
  ha_entity_net_tx: "str?"
  ha_entity_fan: "str?"
  ha_entity_disk_temp: "str?"
  ha_entity_uptime: "str?"
  ha_entity_disk_read: "str?"
  ha_entity_disk_write: "str?"
